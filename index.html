<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minero Infinito 9:16</title>
  <style>
    :root {
      --bg: #1f130f;
      --panel: #2c1b16;
      --text: #f6e6d7;
      --accent: #ffd166;
      --good: #7bd389;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 30% 20%, #3e2a20, #120a08 65%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      padding: 16px;
      gap: 16px;
    }

    .wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
    }

    .game-shell {
      width: min(92vw, 430px);
      aspect-ratio: 9 / 16;
      background: #100906;
      border: 4px solid #5a3a2d;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
    }

    .ui {
      width: min(92vw, 360px);
      background: var(--panel);
      border: 2px solid #6f4a39;
      border-radius: 14px;
      padding: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .stats b { color: var(--accent); }

    .controls {
      display: grid;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px;
      font-weight: 700;
      cursor: pointer;
      background: #8f5f46;
      color: white;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .upgrade-list {
      margin-top: 8px;
      max-height: 250px;
      overflow: auto;
      display: grid;
      gap: 6px;
      padding-right: 4px;
    }

    .upgrade {
      background: #3a261f;
      border: 1px solid #6d4736;
      border-radius: 10px;
      padding: 8px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .hpbar {
      height: 10px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.15);
      overflow: hidden;
      margin-top: 6px;
    }

    .hpfill {
      height: 100%;
      width: 100%;
      background: linear-gradient(to right, var(--good), #9be564);
      transition: width 0.25s ease;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="game-shell">
      <canvas id="game" width="450" height="800"></canvas>
    </div>

    <aside class="ui">
      <div class="stats">
        <div>Oro: <b id="gold">0</b></div>
        <div>Daño/s total: <b id="dps">10</b></div>
        <div>Mineros: <b id="miners">1</b></div>
        <div>Piso roto: <b id="depth">0</b></div>
      </div>

      <div>HP del piso actual: <span id="floorHpText">70 / 70</span></div>
      <div class="hpbar"><div class="hpfill" id="floorHpFill"></div></div>

      <div class="controls">
        <button id="hireMiner">Contratar minero (30 oro)</button>
      </div>

      <h4>Mejoras del pico/machete (10)</h4>
      <div class="upgrade-list" id="upgradeList"></div>
    </aside>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const ui = {
      gold: document.getElementById('gold'),
      dps: document.getElementById('dps'),
      miners: document.getElementById('miners'),
      depth: document.getElementById('depth'),
      floorHpText: document.getElementById('floorHpText'),
      floorHpFill: document.getElementById('floorHpFill'),
      hireMiner: document.getElementById('hireMiner'),
      upgradeList: document.getElementById('upgradeList')
    };

    const state = {
      gold: 0,
      miners: 1,
      baseDamagePerMiner: 10,
      depth: 0,
      floors: [],
      currentFloorIndex: 0,
      worldYOffset: 0,
      worldShakeTime: 0,
      attackBeat: 0,
      attackInterval: 1000,
      lastAttack: performance.now(),
      difficultyStep: 8,
      minerHireCost: 30,
      boughtUpgrades: new Set(),
      upgrades: []
    };

    const FLOOR_COUNT = 10;
    const W = canvas.width;
    const H = canvas.height;
    const lowerHalfY = H / 2;
    const floorHeight = (H / 2) / FLOOR_COUNT;

    function makeUpgradeData() {
      const list = [];
      let cost = 20;
      for (let i = 1; i <= 10; i++) {
        list.push({
          id: i,
          name: `Mejora ${i}`,
          damageBonus: i * 3,
          cost
        });
        cost = Math.floor(cost * 1.6 + 12);
      }
      return list;
    }

    state.upgrades = makeUpgradeData();

    function baseFloorHp(depth) {
      return 70 + depth * state.difficultyStep;
    }

    function addFloorAtEnd() {
      const hp = baseFloorHp(state.depth + (state.floors.length - state.currentFloorIndex));
      state.floors.push({ hp, maxHp: hp });
    }

    function initFloors() {
      for (let i = 0; i < FLOOR_COUNT; i++) {
        const hp = baseFloorHp(i);
        state.floors.push({ hp, maxHp: hp });
      }
    }

    function totalDamagePerHit() {
      return state.baseDamagePerMiner * state.miners;
    }

    function renderUpgrades() {
      ui.upgradeList.innerHTML = '';
      state.upgrades.forEach((u) => {
        const row = document.createElement('div');
        row.className = 'upgrade';

        const info = document.createElement('div');
        info.textContent = `${u.name}: +${u.damageBonus} daño/minero | ${u.cost} oro`;

        const btn = document.createElement('button');
        const bought = state.boughtUpgrades.has(u.id);
        btn.textContent = bought ? 'Comprado' : 'Comprar';
        btn.disabled = bought || state.gold < u.cost;
        btn.addEventListener('click', () => {
          if (state.gold >= u.cost && !state.boughtUpgrades.has(u.id)) {
            state.gold -= u.cost;
            state.baseDamagePerMiner += u.damageBonus;
            state.boughtUpgrades.add(u.id);
            refreshUI();
            renderUpgrades();
          }
        });

        row.append(info, btn);
        ui.upgradeList.appendChild(row);
      });
    }

    ui.hireMiner.addEventListener('click', () => {
      if (state.gold < state.minerHireCost) return;
      state.gold -= state.minerHireCost;
      state.miners += 1;
      state.minerHireCost = Math.floor(state.minerHireCost * 1.55 + 8);
      ui.hireMiner.textContent = `Contratar minero (${state.minerHireCost} oro)`;
      refreshUI();
      renderUpgrades();
    });

    function refreshUI() {
      const floor = state.floors[state.currentFloorIndex];
      const hpPct = Math.max(0, floor.hp / floor.maxHp) * 100;
      ui.gold.textContent = state.gold;
      ui.dps.textContent = totalDamagePerHit();
      ui.miners.textContent = state.miners;
      ui.depth.textContent = state.depth;
      ui.floorHpText.textContent = `${Math.max(0, Math.ceil(floor.hp))} / ${floor.maxHp}`;
      ui.floorHpFill.style.width = `${hpPct}%`;

      ui.hireMiner.disabled = state.gold < state.minerHireCost;
    }

    function attackCurrentFloor() {
      const floor = state.floors[state.currentFloorIndex];
      floor.hp -= totalDamagePerHit();
      state.worldShakeTime = 180;
      state.attackBeat = 220;

      if (floor.hp <= 0) {
        state.gold += 10;
        state.depth += 1;
        state.currentFloorIndex += 1;
        addFloorAtEnd();
        state.worldYOffset = 22;
      }

      if (state.currentFloorIndex > 2) {
        state.floors.shift();
        state.currentFloorIndex -= 1;
      }

      refreshUI();
      renderUpgrades();
    }

    function drawCaveBackground() {
      ctx.fillStyle = '#b48a68';
      ctx.fillRect(0, 0, W, lowerHalfY);

      // manchas tipo cueva
      for (let i = 0; i < 16; i++) {
        const x = (i * 73) % W;
        const y = ((i * 91) % lowerHalfY);
        ctx.fillStyle = i % 2 ? 'rgba(95,60,42,0.20)' : 'rgba(150,105,78,0.18)';
        ctx.beginPath();
        ctx.ellipse(x, y, 40, 20, (i * 0.7) % Math.PI, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawFloors(dt) {
      if (state.worldYOffset > 0) {
        state.worldYOffset = Math.max(0, state.worldYOffset - dt * 0.08);
      }

      let shakeX = 0;
      if (state.worldShakeTime > 0) {
        state.worldShakeTime -= dt;
        shakeX = (Math.random() - 0.5) * 5;
      }

      for (let i = 0; i < FLOOR_COUNT; i++) {
        const floorData = state.floors[state.currentFloorIndex + i];
        const y = lowerHalfY + (i * floorHeight) - state.worldYOffset;

        const brightness = 105 - i * 5;
        ctx.fillStyle = `hsl(23, 45%, ${Math.max(23, brightness)}%)`;
        ctx.fillRect(shakeX, y, W, floorHeight - 2);

        if (floorData) {
          ctx.fillStyle = 'rgba(255,255,255,0.16)';
          const hpw = (floorData.hp / floorData.maxHp) * (W - 24);
          ctx.fillRect(12 + shakeX, y + floorHeight - 8, Math.max(0, hpw), 4);
        }
      }
    }

    function drawMiner(x, y, phase, tint = '#efd9c5') {
      const swing = Math.sin(phase) * 0.55;

      // cabeza
      ctx.fillStyle = tint;
      ctx.beginPath();
      ctx.arc(x, y - 36, 12, 0, Math.PI * 2);
      ctx.fill();

      // cuerpo
      ctx.strokeStyle = '#2a1a14';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x, y - 24);
      ctx.lineTo(x, y + 12);
      ctx.stroke();

      // piernas
      ctx.beginPath();
      ctx.moveTo(x, y + 12);
      ctx.lineTo(x - 12, y + 34);
      ctx.moveTo(x, y + 12);
      ctx.lineTo(x + 11, y + 34);
      ctx.stroke();

      // brazo izquierdo
      ctx.beginPath();
      ctx.moveTo(x, y - 10);
      ctx.lineTo(x - 15, y + 4);
      ctx.stroke();

      // brazo derecho con machete/pico pequeño
      const handX = x + Math.cos(swing) * 18;
      const handY = y - 8 + Math.sin(swing) * 14;
      ctx.beginPath();
      ctx.moveTo(x, y - 10);
      ctx.lineTo(handX, handY);
      ctx.stroke();

      // mango
      ctx.strokeStyle = '#714b35';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(handX, handY);
      ctx.lineTo(handX + 10, handY + 10);
      ctx.stroke();

      // cabeza del pico
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(handX + 8, handY + 7);
      ctx.lineTo(handX + 16, handY + 4);
      ctx.moveTo(handX + 10, handY + 9);
      ctx.lineTo(handX + 7, handY + 15);
      ctx.stroke();
    }

    function drawScene(dt, time) {
      ctx.clearRect(0, 0, W, H);
      drawCaveBackground();
      drawFloors(dt);

      const standingY = lowerHalfY + floorHeight - 10;
      const beat = state.attackBeat > 0 ? (time * 0.02) : 0;
      state.attackBeat = Math.max(0, state.attackBeat - dt);

      // minero principal
      drawMiner(W * 0.5, standingY - 28, beat, '#ffd8b4');

      // mineros extra (si se compran)
      const extras = state.miners - 1;
      for (let i = 0; i < extras; i++) {
        const dir = i % 2 === 0 ? -1 : 1;
        const rank = Math.floor(i / 2) + 1;
        const x = W * 0.5 + dir * (40 + rank * 22);
        drawMiner(x, standingY - 24, beat + i * 0.8, '#e8c4a0');
      }

      // texto de guía
      ctx.fillStyle = 'rgba(0,0,0,0.32)';
      ctx.fillRect(10, 8, 230, 30);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px Arial';
      ctx.fillText('Golpe automático cada 1 segundo', 18, 28);
    }

    function loop(now) {
      const dt = Math.min(34, now - (loop.last || now));
      loop.last = now;

      if (now - state.lastAttack >= state.attackInterval) {
        state.lastAttack = now;
        attackCurrentFloor();
      }

      drawScene(dt, now);
      requestAnimationFrame(loop);
    }

    initFloors();
    refreshUI();
    renderUpgrades();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
